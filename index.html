<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat Bantu Nilai E-rapor</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tw: {
                            bg: '#15202B',
                            card: '#192734',
                            border: '#38444d',
                            text: '#F7F9F9',
                            subtext: '#8899A6',
                            accent: '#1D9BF0',
                            hover: '#22303c'
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-200">
    <div id="root"></div>

    <script>
    // htm menggantikan Babel/JSX — tidak perlu kompilasi
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useMemo, Fragment } = React;

    /* ========== ICON COMPONENTS ========== */
    const IconBase = ({ children, className }) => (
        html`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className=${className || "w-4 h-4"}>${children}</svg>`
    );

    const Users = (p) => html`<${IconBase} ...${p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></${IconBase}>`;
    const BookOpen = (p) => html`<${IconBase} ...${p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></${IconBase}>`;
    const BarChart3 = (p) => html`<${IconBase} ...${p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></${IconBase}>`;
    const Plus = (p) => html`<${IconBase} ...${p}><path d="M5 12h14"/><path d="M12 5v14"/></${IconBase}>`;
    const Trash2 = (p) => html`<${IconBase} ...${p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></${IconBase}>`;
    const FileSpreadsheet = (p) => html`<${IconBase} ...${p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></${IconBase}>`;
    const AlertTriangle = (p) => html`<${IconBase} ...${p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></${IconBase}>`;
    const Lock = (p) => html`<${IconBase} ...${p}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></${IconBase}>`;
    const LogOut = (p) => html`<${IconBase} ...${p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></${IconBase}>`;
    const Copy = (p) => html`<${IconBase} ...${p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></${IconBase}>`;
    const Check = (p) => html`<${IconBase} ...${p}><polyline points="20 6 9 17 4 12"/></${IconBase}>`;
    const Star = (p) => html`<${IconBase} ...${p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></${IconBase}>`;
    const Edit = (p) => html`<${IconBase} ...${p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></${IconBase}>`;
    const MenuIcon = (p) => html`<${IconBase} ...${p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></${IconBase}>`;
    const Sun = (p) => html`<${IconBase} ...${p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></${IconBase}>`;
    const Moon = (p) => html`<${IconBase} ...${p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></${IconBase}>`;
    const ChevronLeft = (p) => html`<${IconBase} ...${p}><polyline points="15 18 9 12 15 6"/></${IconBase}>`;
    const ChevronRight = (p) => html`<${IconBase} ...${p}><polyline points="9 18 15 12 9 6"/></${IconBase}>`;
    const KeyIcon = (p) => html`<${IconBase} ...${p}><circle cx="8" cy="8" r="5"/><path d="M13 13l4 4"/><path d="M15 11l2 2"/></${IconBase}>`;

    /* ========== LOGIN ========== */
    const LoginScreen = ({ onLogin, isDarkMode, toggleDarkMode }) => {
        const [password, setPassword] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState('');

        const handleSubmit = (e) => {
            e.preventDefault();
            setIsLoading(true); setError('');
            setTimeout(() => {
                if (password === '12345') onLogin({ password });
                else { setError('Password salah'); setIsLoading(false); }
            }, 1000);
        };

        return html`
            <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-tw-bg p-4">
                <div className="max-w-md w-full">
                    <div className="bg-white dark:bg-tw-card rounded-xl shadow-lg p-8">
                        <div className="flex justify-center mb-6">
                            <div className="flex items-center gap-2 font-bold text-indigo-700 dark:text-tw-text text-2xl">
                                <${BookOpen} className="w-8 h-8" />
                                <span>Albanira2</span>
                            </div>
                        </div>
                        <div className="text-center mb-6">
                            <h2 className="text-xl font-bold text-slate-800 dark:text-tw-text">Masuk ke Aplikasi</h2>
                            <p className="text-slate-500 dark:text-tw-subtext text-sm mt-1">Masukkan password untuk melanjutkan</p>
                        </div>
                        <form onSubmit=${handleSubmit} className="space-y-4">
                            ${error && html`<div className="p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm">${error}</div>`}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 dark:text-tw-text mb-1">Password</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <${Lock} className="h-5 w-5 text-slate-400" />
                                    </div>
                                    <input type="password" value=${password} onInput=${(e) => setPassword(e.target.value)}
                                        className="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-tw-border rounded-lg bg-white dark:bg-tw-hover text-slate-800 dark:text-tw-text placeholder-slate-400 dark:placeholder-tw-subtext focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                        placeholder="Password" required />
                                </div>
                            </div>
                            <div className="pt-2">
                                <button type="submit" disabled=${isLoading}
                                    className="w-full flex justify-center items-center gap-2 px-4 py-2 bg-indigo-600 dark:bg-tw-accent text-white rounded-lg hover:bg-indigo-700 dark:hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                                    ${isLoading ? html`
                                        <${Fragment}>
                                            <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                            Memproses...
                                        </${Fragment}>
                                    ` : html`
                                        <${Fragment}>
                                            <${KeyIcon} className="w-5 h-5" />
                                            Masuk
                                        </${Fragment}>
                                    `}
                                </button>
                            </div>
                        </form>
                        <div className="mt-6 text-center text-xs text-slate-500 dark:text-tw-subtext">
                            <p>@2025 Pengembang <strong><a href="https://agungjnugraha.github.io/portofolio" title="ajnugraha apps" className="text-indigo-600 dark:text-tw-accent hover:underline">AJ Nugraha</a></strong></p>
                        </div>
                    </div>
                    <div className="mt-4 flex justify-center">
                        <button onClick=${toggleDarkMode} className="p-2 rounded-full bg-white dark:bg-tw-card shadow-md text-slate-600 dark:text-tw-subtext hover:bg-slate-100 dark:hover:bg-tw-hover">
                            ${isDarkMode ? html`<${Sun} className="w-5 h-5" />` : html`<${Moon} className="w-5 h-5" />`}
                        </button>
                    </div>
                </div>
            </div>
        `;
    };

    /* ========== SIDEBAR ITEM ========== */
    const SidebarItem = ({ id, icon: Icon, label, activeTab, setActiveTab, isMinimized }) => (
        html`<button onClick=${() => setActiveTab(id)} title=${isMinimized ? label : ''}
            className=${`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors rounded-lg mb-1 relative group ${activeTab === id ? 'bg-indigo-600 text-white shadow-md dark:bg-tw-accent dark:text-white' : 'text-slate-600 hover:bg-slate-100 dark:text-tw-subtext dark:hover:bg-tw-hover dark:hover:text-tw-text'}`}>
            <${Icon} className="w-5 h-5 flex-shrink-0" />
            ${!isMinimized && html`<span className="whitespace-nowrap">${label}</span>`}
            ${isMinimized && html`<div className="absolute left-full ml-2 px-2 py-1 bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none">${label}</div>`}
        </button>`
    );

    /* ========== APLIKASI UTAMA ========== */
    const SmartGradeApp = ({ onLogout, isDarkMode, toggleDarkMode }) => {
        const [activeTab, setActiveTab] = useState('siswa');
        const [kkm, setKkm] = useState(75);
        const [isSidebarOpen, setIsSidebarOpen] = useState(false);
        const [isSidebarMinimized, setIsSidebarMinimized] = useState(false);
        const [confirmClearScores, setConfirmClearScores] = useState(false);
        const [confirmClearStudents, setConfirmClearStudents] = useState(false);
        const [copySuccess, setCopySuccess] = useState(false);
        const [showRenameModal, setShowRenameModal] = useState(false);
        const [renameModalValue, setRenameModalValue] = useState("");
        const [showDeleteModal, setShowDeleteModal] = useState(false);

        const [students, setStudents] = useState([
            { id: 1, name: 'Ahmad Santoso', nickname: 'Ahmad' },
            { id: 2, name: 'Budi Pratama', nickname: 'Budi' },
            { id: 3, name: 'Citra Dewi', nickname: 'Citra' },
        ]);

        const [tpColumns, setTpColumns] = useState(['TP 1', 'TP 2', 'TP 3']);
        const [scores, setScores] = useState({
            1: { 0: 80, 1: 90, 2: 85 },
            2: { 0: 70, 1: 75, 2: 70 },
            3: { 0: 85, 1: 85, 2: 95 },
        });

        const [activities, setActivities] = useState([
            { id: 1, name: 'Pramuka', tps: ['Kedisiplinan', 'Kerjasama'] },
            { id: 2, name: 'Futsal', tps: ['Dribbling', 'Shooting'] },
            { id: 3, name: 'PMR', tps: ['P3K', 'Tandu'] },
            { id: 4, name: 'Tari', tps: ['Wiraga', 'Wirama'] }
        ]);
        const [activeActivityId, setActiveActivityId] = useState(1);
        const [rekapMode, setRekapMode] = useState('single');

        const [extraScores, setExtraScores] = useState({
            1: { 1: { 0: true, 1: true }, 2: { 0: false, 1: true }, 3: { 0: true, 1: false } },
            2: { 1: { 0: true, 1: false } },
            3: { 2: { 0: true, 1: true } },
            4: { 3: { 0: true, 1: true } }
        });

        useEffect(() => {
            setConfirmClearScores(false);
            setConfirmClearStudents(false);
            setCopySuccess(false);
            setIsSidebarOpen(false);
        }, [activeTab]);

        const currentActivity = useMemo(() =>
            activities.find(a => a.id === activeActivityId) || activities[0]
        , [activities, activeActivityId]);

        const openRenameModal = () => { setRenameModalValue(currentActivity.name); setShowRenameModal(true); };
        const saveRenameActivity = (e) => {
            e.preventDefault();
            if (renameModalValue.trim()) {
                setActivities(activities.map(a => a.id === activeActivityId ? { ...a, name: renameModalValue } : a));
                setShowRenameModal(false);
            }
        };
        const addActivity = () => {
            const newId = activities.length > 0 ? Math.max(...activities.map(a => a.id)) + 1 : 1;
            setActivities([...activities, { id: newId, name: 'Ekstra ' + newId, tps: ['Kompetensi 1', 'Kompetensi 2'] }]);
            setActiveActivityId(newId);
            setExtraScores(prev => ({ ...prev, [newId]: {} }));
        };
        const initiateDeleteActivity = () => {
            if (activities.length <= 1) { alert("Minimal harus ada satu aktivitas."); return; }
            setShowDeleteModal(true);
        };
        const confirmDeleteActivity = () => {
            const idToDelete = activeActivityId;
            const newActivities = activities.filter(a => a.id !== idToDelete);
            setActivities(newActivities);
            setActiveActivityId(newActivities[0].id);
            const ns = { ...extraScores }; delete ns[idToDelete]; setExtraScores(ns);
            setShowDeleteModal(false);
        };

        const processedData = useMemo(() => {
            return students.map(student => {
                const rawScores = tpColumns.map((_, idx) => {
                    const val = scores[student.id] && scores[student.id][idx];
                    return val !== undefined && val !== '' ? parseFloat(val) : null;
                });
                const validScores = rawScores.filter(s => s !== null);
                const sum = validScores.reduce((a, b) => a + b, 0);
                const avg = validScores.length ? Math.round(sum / validScores.length) : 0;
                const maxScore = validScores.length > 0 ? Math.max(...validScores) : null;
                const minScore = validScores.length > 0 ? Math.min(...validScores) : null;
                let countMax = 0, countMin = 0;
                const scoresWithStatus = tpColumns.map((col, idx) => {
                    const val = rawScores[idx];
                    let status = '';
                    if (val !== null) {
                        if (val === maxScore && countMax < 2) { status = 'T'; countMax++; }
                        else if (val === minScore && countMin < 2) { status = 'R'; countMin++; }
                    }
                    return { val, status };
                });
                return { ...student, scoresWithStatus, average: avg };
            });
        }, [students, scores, tpColumns]);

        const calculateExtraResult = (student, activityTps, rawScores) => {
            const isParticipating = rawScores.some(val => val !== undefined && val !== null);
            if (!isParticipating) return null;
            const trueCount = rawScores.filter(v => v === true).length;
            const totalCount = activityTps.length;
            let finalScore = 0, scoreLabel = '-', labelColor = 'text-slate-400 dark:text-tw-subtext';
            if (totalCount > 0) {
                if (trueCount === totalCount) { finalScore = 4; scoreLabel = 'Sangat Baik'; labelColor = 'text-emerald-600 bg-emerald-50 border border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800'; }
                else if (trueCount === 0) { finalScore = 2; scoreLabel = 'Cukup'; labelColor = 'text-rose-600 bg-rose-50 border border-rose-200 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800'; }
                else { finalScore = 3; scoreLabel = 'Baik'; labelColor = 'text-blue-600 bg-blue-50 border border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800'; }
            }
            const mampuList = [], bimbinganList = [];
            activityTps.forEach((tp, idx) => {
                if (rawScores[idx] === true) mampuList.push(tp);
                else if (rawScores[idx] === false) bimbinganList.push(tp);
            });
            const joinList = (list) => { if (!list.length) return ''; if (list.length === 1) return list[0]; const last = list[list.length - 1]; return list.slice(0, -1).join(', ') + ' dan ' + last; };
            const sapaan = student.nickname ? 'Ananda ' + student.nickname : 'Ananda ' + student.name.split(' ')[0];
            const txtM = joinList(mampuList), txtB = joinList(bimbinganList);
            let deskripsi = '-';
            if (mampuList.length > 0 && bimbinganList.length > 0) deskripsi = sapaan + ' mampu dalam hal ' + txtM + ' serta masih perlu bimbingan dalam hal ' + txtB + '.';
            else if (mampuList.length > 0) deskripsi = sapaan + ' mampu dalam hal ' + txtM + '.';
            else if (bimbinganList.length > 0) deskripsi = sapaan + ' masih perlu bimbingan dalam hal ' + txtB + '.';
            return { finalScore, scoreLabel, labelColor, deskripsi };
        };

        const processedExtraDataSingle = useMemo(() => {
            const atps = currentActivity.tps;
            const as = extraScores[currentActivity.id] || {};
            return students.map(student => {
                const raw = atps.map((_, idx) => as[student.id] ? as[student.id][idx] : undefined);
                return { ...student, extraRaw: raw, result: calculateExtraResult(student, atps, raw) };
            });
        }, [students, extraScores, currentActivity]);

        const processedExtraDataAll = useMemo(() => {
            let list = [];
            students.forEach(student => {
                activities.forEach(act => {
                    const as = extraScores[act.id] || {};
                    const raw = act.tps.map((_, idx) => as[student.id] ? as[student.id][idx] : undefined);
                    const r = calculateExtraResult(student, act.tps, raw);
                    if (r) list.push({ studentName: student.name, activityName: act.name, finalScore: r.finalScore, deskripsi: r.deskripsi, scoreLabel: r.scoreLabel, labelColor: r.labelColor });
                });
            });
            return list;
        }, [students, extraScores, activities]);

        /* --- Handlers --- */
        const handlePasteStudents = (e, fieldType, targetId) => {
            e.preventDefault();
            const lines = e.clipboardData.getData('text').split(/\r\n|\n|\r/).filter(n => n.trim());
            if (!lines.length) return;
            const startIdx = students.findIndex(s => s.id === targetId);
            let updated = [...students];
            let nextId = students.length ? Math.max(...students.map(s => s.id)) + 1 : 1;
            lines.forEach((line, i) => {
                const ci = startIdx + i, val = line.trim();
                if (ci >= 0 && ci < updated.length) updated[ci] = { ...updated[ci], [fieldType]: val };
                else updated.push({ id: nextId++, name: fieldType === 'name' ? val : '', nickname: fieldType === 'nickname' ? val : '' });
            });
            setStudents(updated);
        };
        const addStudent = () => {
            const nid = students.length ? Math.max(...students.map(s => s.id)) + 1 : 1;
            setStudents([...students, { id: nid, name: '', nickname: '' }]);
        };
        const updateStudentData = (id, field, value) => setStudents(students.map(s => s.id === id ? { ...s, [field]: value } : s));
        const deleteStudent = (id) => {
            setStudents(students.filter(s => s.id !== id));
            const ns = { ...scores }; delete ns[id]; setScores(ns);
            const ne = { ...extraScores }; Object.keys(ne).forEach(k => { if (ne[k][id]) delete ne[k][id]; }); setExtraScores(ne);
        };
        const handleClearAllStudents = () => {
            if (confirmClearStudents) { setStudents([]); setScores({}); setExtraScores({}); setConfirmClearStudents(false); }
            else { setConfirmClearStudents(true); setTimeout(() => setConfirmClearStudents(false), 3000); }
        };
        const handlePasteScores = (e, si, ci) => {
            e.preventDefault();
            const rows = e.clipboardData.getData('text').split(/\r\n|\n|\r/).filter(r => r.trim());
            const ns = { ...scores };
            rows.forEach((row, ri) => {
                const ti = si + ri;
                if (ti < students.length) {
                    const sid = students[ti].id, cols = row.split('\t');
                    if (!ns[sid]) ns[sid] = {};
                    cols.forEach((v, c) => {
                        const tc = ci + c;
                        if (tc < tpColumns.length) { const cv = v.trim().replace(',', '.'); if (!isNaN(cv) || cv === '') ns[sid][tc] = cv; }
                    });
                }
            });
            setScores(ns);
        };
        const updateScore = (sid, ci, v) => {
            if (v === '' || (!isNaN(v) && parseFloat(v) >= 0 && parseFloat(v) <= 100))
                setScores(p => ({ ...p, [sid]: { ...(p[sid] || {}), [ci]: v } }));
        };
        const addTpColumn = () => setTpColumns([...tpColumns, 'TP ' + (tpColumns.length + 1)]);
        const removeTpColumn = (i) => { if (tpColumns.length <= 1) return; setTpColumns(tpColumns.filter((_, j) => j !== i)); };
        const handleClearAllScores = () => {
            if (confirmClearScores) { setScores({}); setConfirmClearScores(false); }
            else { setConfirmClearScores(true); setTimeout(() => setConfirmClearScores(false), 3000); }
        };
        const toggleExtraScore = (sid, ci) => {
            setExtraScores(prev => {
                const as = { ...(prev[activeActivityId] || {}) };
                const ss = { ...(as[sid] || {}) };
                const cur = ss[ci]; let nv;
                if (cur === undefined || cur === null) nv = true;
                else if (cur === true) nv = false;
                else nv = null;
                if (nv === null) delete ss[ci]; else ss[ci] = nv;
                as[sid] = ss;
                return { ...prev, [activeActivityId]: as };

                                                <tr className="border-b border-slate-200 dark:border-tw-border bg-slate-50 dark:bg-tw-hover">
                                                    <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext w-12">No</th>
                                                    <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[180px]">Nama</th>
                                                    ${tpColumns.map((col, idx) => html`<th key=${idx} className="px-3 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[100px]">${col}</th>`)}
                                                    <th className="px-4 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[100px]">Rata-rata</th>
                                                    <th className="px-4 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[80px]">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${processedData.length === 0 ? html`
                                                    <tr><td colSpan=${tpColumns.length + 4} className="px-4 py-12 text-center text-slate-400 dark:text-tw-subtext"><${BarChart3} className="w-12 h-12 mx-auto mb-3 opacity-30" /><p>Belum ada data.</p></td></tr>
                                                ` : processedData.map((student, idx) => html`
                                                    <tr key=${student.id} className="border-b border-slate-100 dark:border-tw-border hover:bg-slate-50 dark:hover:bg-tw-hover/50 transition-colors">
                                                        <td className="px-4 py-2 text-slate-500 dark:text-tw-subtext">${idx + 1}</td>
                                                        <td className="px-4 py-2 font-medium">${student.name || '-'}</td>
                                                        ${student.scoresWithStatus.map((d, cIdx) => html`
                                                            <td key=${cIdx} className="px-3 py-2 text-center">
                                                                <div className="flex items-center justify-center gap-1">
                                                                    <span className=${d.val !== null ? '' : 'text-slate-300 dark:text-slate-600'}>${d.val !== null ? d.val : '-'}</span>
                                                                    ${d.status === 'T' && html`<span className="text-xs font-bold text-emerald-600 dark:text-emerald-400">T</span>`}
                                                                    ${d.status === 'R' && html`<span className="text-xs font-bold text-rose-600 dark:text-rose-400">R</span>`}
                                                                </div>
                                                            </td>
                                                        `)}
                                                        <td className="px-4 py-2 text-center font-bold text-lg">${student.average || '-'}</td>
                                                        <td className="px-4 py-2 text-center">
                                                            ${student.average > 0 ? (
                                                                student.average >= kkm
                                                                    ? html`<span className="px-2 py-1 text-xs font-semibold rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800">Tuntas</span>`
                                                                    : html`<span className="px-2 py-1 text-xs font-semibold rounded-full bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800">Belum</span>`
                                                            ) : html`<span className="text-slate-300 dark:text-slate-600">-</span>`}
                                                        </td>
                                                    </tr>
                                                `)}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        `}

                        <!-- ===== TAB: INPUT NILAI EKSTRA ===== -->
                        ${activeTab === 'input-ekstra' && html`
                            <div className="max-w-full mx-auto">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                                    <h1 className="text-2xl font-bold text-slate-800 dark:text-tw-text">Input Nilai Ekstrakurikuler</h1>
                                    <div className="flex items-center gap-2">
                                        <button onClick=${openRenameModal} className="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors" title="Ubah Nama"><${Edit} className="w-4 h-4" /></button>
                                        <button onClick=${addActivity} className="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors" title="Tambah Aktivitas"><${Plus} className="w-4 h-4" /></button>
                                        <button onClick=${initiateDeleteActivity} className="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors" title="Hapus Aktivitas"><${Trash2} className="w-4 h-4" /></button>
                                    </div>
                                </div>
                                <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                                    ${activities.map(act => html`
                                        <button key=${act.id} onClick=${() => setActiveActivityId(act.id)} className=${`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${act.id === activeActivityId ? 'bg-indigo-600 dark:bg-tw-accent text-white shadow-md' : 'bg-white dark:bg-tw-card text-slate-600 dark:text-tw-subtext border border-slate-200 dark:border-tw-border hover:bg-slate-100 dark:hover:bg-tw-hover'}`}>
                                            ${act.name}
                                        </button>
                                    `)}
                                </div>
                                <div className="bg-white dark:bg-tw-card rounded-xl shadow-sm border border-slate-200 dark:border-tw-border overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="border-b border-slate-200 dark:border-tw-border bg-slate-50 dark:bg-tw-hover">
                                                    <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext w-12 sticky left-0 bg-slate-50 dark:bg-tw-hover z-10">No</th>
                                                    <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[180px] sticky left-12 bg-slate-50 dark:bg-tw-hover z-10">Nama</th>
                                                    ${currentActivity.tps.map((tp, idx) => html`
                                                        <th key=${idx} className="px-3 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[120px] relative group">
                                                            <input type="text" value=${tp} onInput=${(e) => updateExtraColumnName(idx, e.target.value)} className="w-full text-center bg-transparent border-b border-transparent hover:border-slate-300 dark:hover:border-tw-border focus:border-indigo-500 focus:outline-none font-semibold text-sm" />
                                                            ${currentActivity.tps.length > 1 && html`<button onClick=${() => removeExtraTpColumn(idx)} className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">x</button>`}
                                                        </th>
                                                    `)}
                                                    <th className="px-3 py-3 text-center w-10">
                                                        <button onClick=${addExtraTpColumn} className="p-1 text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors" title="Tambah Kompetensi"><${Plus} className="w-5 h-5" /></button>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${students.length === 0 ? html`
                                                    <tr><td colSpan=${currentActivity.tps.length + 3} className="px-4 py-12 text-center text-slate-400 dark:text-tw-subtext"><${Star} className="w-12 h-12 mx-auto mb-3 opacity-30" /><p>Tambahkan siswa terlebih dahulu.</p></td></tr>
                                                ` : students.map((student, sIdx) => html`
                                                    <tr key=${student.id} className="border-b border-slate-100 dark:border-tw-border hover:bg-slate-50 dark:hover:bg-tw-hover/50 transition-colors">
                                                        <td className="px-4 py-2 text-slate-500 dark:text-tw-subtext sticky left-0 bg-white dark:bg-tw-card z-10">${sIdx + 1}</td>
                                                        <td className="px-4 py-2 font-medium sticky left-12 bg-white dark:bg-tw-card z-10">${student.name || '-'}</td>
                                                        ${currentActivity.tps.map((_, cIdx) => {
                                                            const val = extraScores[currentActivity.id] && extraScores[currentActivity.id][student.id] ? extraScores[currentActivity.id][student.id][cIdx] : undefined;
                                                            return html`
                                                                <td key=${cIdx} className="px-2 py-1 text-center" onPaste=${(e) => handlePasteExtraScores(e, sIdx, cIdx)}>
                                                                    <button onClick=${() => toggleExtraScore(student.id, cIdx)} className=${`w-10 h-10 rounded-lg border-2 transition-all font-bold text-sm inline-flex items-center justify-center ${val === true ? 'bg-emerald-500 border-emerald-500 text-white' : val === false ? 'bg-rose-500 border-rose-500 text-white' : 'bg-white dark:bg-tw-hover border-slate-300 dark:border-tw-border text-slate-300 dark:text-slate-600 hover:border-slate-400 dark:hover:border-tw-subtext'}`} title="Klik: kosong → Mampu → Perlu Bimbingan → kosong">
                                                                        ${val === true ? 'V' : val === false ? 'X' : '-'}
                                                                    </button>
                                                                </td>
                                                            `;
                                                        })}
                                                        <td></td>
                                                    </tr>
                                                `)}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-400 dark:text-tw-subtext mt-3">Klik sel untuk mengubah: kosong → Mampu (V) → Perlu Bimbingan (X) → kosong. Bisa juga paste dari Excel (1/V/Ya = Mampu, 0/X/Tidak = Perlu Bimbingan).</p>
                            </div>
                        `}

                        <!-- ===== TAB: REKAP EKSTRA ===== -->
                        ${activeTab === 'rekap-ekstra' && html`
                            <div className="max-w-full mx-auto">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                                    <h1 className="text-2xl font-bold text-slate-800 dark:text-tw-text">Rekap Nilai Ekstrakurikuler</h1>
                                    <div className="flex items-center gap-3">
                                        <div className="flex bg-slate-100 dark:bg-tw-hover rounded-lg p-0.5">
                                            <button onClick=${() => setRekapMode('single')} className=${`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${rekapMode === 'single' ? 'bg-white dark:bg-tw-card text-indigo-600 dark:text-tw-accent shadow-sm' : 'text-slate-500 dark:text-tw-subtext'}`}>Per Aktivitas</button>
                                            <button onClick=${() => setRekapMode('all')} className=${`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${rekapMode === 'all' ? 'bg-white dark:bg-tw-card text-indigo-600 dark:text-tw-accent shadow-sm' : 'text-slate-500 dark:text-tw-subtext'}`}>Semua</button>
                                        </div>
                                        <button onClick=${handleCopyExtraResults} className=${`flex items-center gap-2 px-4 py-2 border rounded-lg text-sm font-medium transition-all ${copySuccess ? 'bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-900/20 dark:border-emerald-800 dark:text-emerald-400' : 'bg-indigo-50 text-indigo-600 border-indigo-200 hover:bg-indigo-100 dark:bg-indigo-900/20 dark:border-indigo-800 dark:text-indigo-400'}`}>
                                            ${copySuccess ? html`<${Fragment}><${Check} className="w-4 h-4" /> Tersalin!</${Fragment}>` : html`<${Fragment}><${Copy} className="w-4 h-4" /> Salin</${Fragment}>`}
                                        </button>
                                    </div>
                                </div>
                                ${rekapMode === 'single' && html`
                                    <div className="mb-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                            ${activities.map(act => html`
                                                <button key=${act.id} onClick=${() => setActiveActivityId(act.id)} className=${`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${act.id === activeActivityId ? 'bg-indigo-600 dark:bg-tw-accent text-white shadow-md' : 'bg-white dark:bg-tw-card text-slate-600 dark:text-tw-subtext border border-slate-200 dark:border-tw-border hover:bg-slate-100 dark:hover:bg-tw-hover'}`}>
                                                    ${act.name}
                                                </button>
                                            `)}
                                        </div>
                                    </div>
                                `}
                                <div className="bg-white dark:bg-tw-card rounded-xl shadow-sm border border-slate-200 dark:border-tw-border overflow-hidden">
                                    <div className="overflow-x-auto">
                                        ${rekapMode === 'single' ? html`
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="border-b border-slate-200 dark:border-tw-border bg-slate-50 dark:bg-tw-hover">
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext w-12">No</th>
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[180px]">Nama</th>
                                                        <th className="px-4 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[100px]">Nilai</th>
                                                        <th className="px-4 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[120px]">Predikat</th>
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[300px]">Deskripsi</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    ${processedExtraDataSingle.length === 0 || processedExtraDataSingle.every(s => !s.result) ? html`
                                                        <tr><td colSpan="5" className="px-4 py-12 text-center text-slate-400 dark:text-tw-subtext"><${Star} className="w-12 h-12 mx-auto mb-3 opacity-30" /><p>Belum ada data.</p></td></tr>
                                                    ` : processedExtraDataSingle.map((student, idx) => html`
                                                        <tr key=${student.id} className="border-b border-slate-100 dark:border-tw-border hover:bg-slate-50 dark:hover:bg-tw-hover/50 transition-colors">
                                                            <td className="px-4 py-2 text-slate-500 dark:text-tw-subtext">${idx + 1}</td>
                                                            <td className="px-4 py-2 font-medium">${student.name || '-'}</td>
                                                            <td className="px-4 py-2 text-center font-bold text-lg">${student.result ? student.result.finalScore : '-'}</td>
                                                            <td className="px-4 py-2 text-center">
                                                                ${student.result ? html`<span className=${'px-2 py-1 text-xs font-semibold rounded-full ' + student.result.labelColor}>${student.result.scoreLabel}</span>` : html`<span className="text-slate-300 dark:text-slate-600">-</span>`}
                                                            </td>
                                                            <td className="px-4 py-2 text-slate-600 dark:text-tw-subtext text-sm">${student.result ? student.result.deskripsi : '-'}</td>
                                                        </tr>
                                                    `)}
                                                </tbody>
                                            </table>
                                        ` : html`
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="border-b border-slate-200 dark:border-tw-border bg-slate-50 dark:bg-tw-hover">
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext w-12">No</th>
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[180px]">Nama</th>
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[120px]">Aktivitas</th>
                                                        <th className="px-4 py-3 text-center font-semibold text-slate-600 dark:text-tw-subtext min-w-[80px]">Nilai</th>
                                                        <th className="px-4 py-3 text-left font-semibold text-slate-600 dark:text-tw-subtext min-w-[300px]">Deskripsi</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    ${processedExtraDataAll.length === 0 ? html`
                                                        <tr><td colSpan="5" className="px-4 py-12 text-center text-slate-400 dark:text-tw-subtext"><${Star} className="w-12 h-12 mx-auto mb-3 opacity-30" /><p>Belum ada data.</p></td></tr>
                                                    ` : processedExtraDataAll.map((row, idx) => html`
                                                        <tr key=${idx} className="border-b border-slate-100 dark:border-tw-border hover:bg-slate-50 dark:hover:bg-tw-hover/50 transition-colors">
                                                            <td className="px-4 py-2 text-slate-500 dark:text-tw-subtext">${idx + 1}</td>
                                                            <td className="px-4 py-2 font-medium">${row.studentName}</td>
                                                            <td className="px-4 py-2 text-slate-600 dark:text-tw-subtext">${row.activityName}</td>
                                                            <td className="px-4 py-2 text-center font-bold text-lg">${row.finalScore}</td>
                                                            <td className="px-4 py-2 text-slate-600 dark:text-tw-subtext text-sm">${row.deskripsi}</td>
                                                        </tr>
                                                    `)}
                                                </tbody>
                                            </table>
                                        `}
                                    </div>
                                </div>
                            </div>
                        `}

                    </div>
                </div>
            </div>
        `;
    };

    /* ========== APP ROOT ========== */
    const App = () => {
        const [isLoggedIn, setIsLoggedIn] = useState(false);
        const [isDarkMode, setIsDarkMode] = useState(false);

        useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }, [isDarkMode]);

        const toggleDarkMode = () => setIsDarkMode(p => !p);

        if (!isLoggedIn) return html`<${LoginScreen} onLogin=${() => setIsLoggedIn(true)} isDarkMode=${isDarkMode} toggleDarkMode=${toggleDarkMode} />`;
        return html`<${SmartGradeApp} onLogout=${() => setIsLoggedIn(false)} isDarkMode=${isDarkMode} toggleDarkMode=${toggleDarkMode} />`;
    };

    /* ========== MOUNT ========== */
    ReactDOM.render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
